<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body class="container mt-5">

    <h2>Edit Task</h2>

    <form method="POST" action="/edit/{{ task.id }}/">
        {% csrf_token %}
        
        <input type="text" name="title" value="{{ task.title }}" class="form-control mb-2">
        
        <button class="btn btn-primary">Update</button>
    </form>

</body>
</html>
