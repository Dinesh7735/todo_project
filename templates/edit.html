<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="text-center">To-Do List</h2>

    <form method="POST" action="/add/" class="d-flex mb-3">
        {% csrf_token %}
        <input type="text" name="title" class="form-control me-2" placeholder="Enter task">
        <button class="btn btn-primary">Add</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between">

            <span>
                {% if task.completed %}
                    <s>{{ task.title }}</s>
                {% else %}
                    {{ task.title }}
                {% endif %}
            </span>

            <div>
                <a href="/toggle/{{ task.id }}" class="btn btn-success btn-sm">✔</a>
                <a href="/edit/{{ task.id }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>
            </div>

        </li>
        {% endfor %}
    </ul>

    <a href="/logout/" class="btn btn-secondary mt-3">Logout</a>

</body>
</html>
</body>
</html>
